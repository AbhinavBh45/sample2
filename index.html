<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetMetric - Abhinav</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">
            <span class="name-letter" style="--i:0">A</span>
            <span class="name-letter" style="--i:1">b</span>
            <span class="name-letter" style="--i:2">h</span>
            <span class="name-letter" style="--i:3">i</span>
            <span class="name-letter" style="--i:4">n</span>
            <span class="name-letter" style="--i:5">a</span>
            <span class="name-letter" style="--i:6">v</span>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="nav-link active">Home</a></li>
            <li><a href="#" class="nav-link">Stats</a></li>
            <li><a href="#" class="nav-link">About</a></li>
            <li><a href="#" class="nav-link">Contact</a></li>
        </ul>
        <div class="nav-glow"></div>
    </nav>

    <div class="container">

        <h1>LeetMetric</h1>

        <div class="user-container">
            <p>Enter your name below: </p>
            <div class="user-input-container">
                <input type="text" placeholder="Enter your usename here" id="user-input">
                <button id="search-btn">Search</button>
            </div>
        </div>

        <div class="stats-container">

            <div class="progress">

                <div class="progress-item">
                    <div class="easy-progress circle">
                        <span id="easy-label"></span>
                        Easy
                    </div>
                </div>

                <div class="progress-item circle">
                    <div class="medium-progress">
                        <span id="medium-label"></span>
                        Medium
                    </div>
                </div>

                <div class="progress-item circle">
                    <div class="hard-progress">
                        <span id="hard-label"></span>
                        Hard
                    </div>
                </div>
            </div>

            <div class="stats-card">
                <!-- from js code -->
            </div>
        </div>

    </div>
    



    <script src="index4.js"></script>
</body>
</html>
