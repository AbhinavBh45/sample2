<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetMetric - Abhinav</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Times New Roman', Times, serif;
        }

        body {
            background-color: rgba(255, 251, 127, 0.952);
            color: rgb(24, 239, 17);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #1a2a1f, #2d4a38, #1a2a1f);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            overflow: hidden;
            animation: navSlideDown 0.6s ease-out;
        }

        @keyframes navSlideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Animated glow bar at bottom of navbar */
        .nav-glow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #299f5d, #18ef11, #299f5d, transparent);
            animation: glowSweep 3s ease-in-out infinite;
        }

        @keyframes glowSweep {
            0%, 100% {
                opacity: 0.4;
                transform: scaleX(0.5);
            }
            50% {
                opacity: 1;
                transform: scaleX(1);
            }
        }

        /* ===== NAME BRAND ===== */
        .nav-brand {
            display: flex;
            gap: 2px;
            cursor: default;
        }

        .name-letter {
            display: inline-block;
            font-size: 1.8rem;
            font-weight: 700;
            color: #18ef11;
            text-shadow: 0 0 10px rgba(24, 239, 17, 0.5);
            animation: letterPopIn 0.5s ease-out backwards;
            animation-delay: calc(var(--i) * 0.1s);
            transition: transform 0.3s ease, color 0.3s ease, text-shadow 0.3s ease;
        }

        .name-letter:hover {
            transform: translateY(-6px) scale(1.2);
            color: #fff;
            text-shadow: 0 0 20px rgba(24, 239, 17, 0.8), 0 0 40px rgba(41, 159, 93, 0.5);
        }

        @keyframes letterPopIn {
            0% {
                opacity: 0;
                transform: translateY(-30px) scale(0.3) rotate(-15deg);
            }
            60% {
                transform: translateY(5px) scale(1.1) rotate(3deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1) rotate(0deg);
            }
        }

        /* ===== NAV LINKS ===== */
        .nav-links {
            display: flex;
            list-style: none;
            gap: 0.5rem;
        }

        .nav-link {
            position: relative;
            text-decoration: none;
            color: #b8d4c8;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: color 0.3s ease, background 0.3s ease, transform 0.2s ease;
            overflow: hidden;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            width: 0;
            height: 2px;
            background: #18ef11;
            transition: width 0.3s ease, left 0.3s ease;
            border-radius: 2px;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(41, 159, 93, 0.15);
            transform: translateY(-2px);
        }

        .nav-link:hover::after {
            width: 60%;
            left: 20%;
        }

        .nav-link.active {
            color: #18ef11;
        }

        .nav-link.active::after {
            width: 60%;
            left: 20%;
            background: #18ef11;
            box-shadow: 0 0 8px rgba(24, 239, 17, 0.6);
        }

        /* ===== RESPONSIVE NAVBAR ===== */
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 0.8rem;
                padding: 0.8rem 1rem;
            }
            .name-letter { font-size: 1.5rem; }
            .nav-links { gap: 0.3rem; }
            .nav-link {
                font-size: 0.85rem;
                padding: 0.4rem 0.7rem;
            }
        }

        /* ===== MAIN CONTENT ADJUSTMENT ===== */
        .container {
            display: flex;
            flex-direction: column;
            background-color: rgba(97, 130, 119, 0.822);
            width: 90%;
            max-width: 650px;
            gap: 1.8rem;
            padding: 2rem;
            border-radius: 0.8rem;
            margin-top: 3rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: containerFadeIn 0.8s ease-out 0.5s backwards;
        }

        @keyframes containerFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-weight: bold;
            font-size: 2.3rem;
            text-align: center;
            color: #fff;
        }

        .user-container p {
            color: #fff;
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        .user-input-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        #user-input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.4rem;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        #search-btn {
            padding: 0.8rem 1.5rem;
            border-radius: 0.4rem;
            border: none;
            background: #299f5d;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        #search-btn:hover {
            background: #18ef11;
        }

        #search-btn:disabled {
            background: #618277;
            cursor: not-allowed;
        }

        /* Circle Progress Styling */
        .progress {
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 1rem;
        }

        .progress-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #283a2e; /* Background track */
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: white;
            font-weight: 700;
            background: conic-gradient(#18ef11 var(--progress-degree, 0%), #283a2e 0%);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            transition: background 1s ease-out;
        }

        /* Inner circle to make it look like a donut chart */
        .circle::before {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: rgba(97, 130, 119, 1);
            border-radius: 50%;
            z-index: 1;
        }

        .circle span, .circle .difficulty-text {
            position: relative;
            z-index: 2;
        }

        .difficulty-text {
            font-size: 0.8rem;
            color: #b8d4c8;
        }
        
        .error-message {
            text-align: center;
            color: #ff4d4d;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">
            <span class="name-letter" style="--i:0">A</span>
            <span class="name-letter" style="--i:1">b</span>
            <span class="name-letter" style="--i:2">h</span>
            <span class="name-letter" style="--i:3">i</span>
            <span class="name-letter" style="--i:4">n</span>
            <span class="name-letter" style="--i:5">a</span>
            <span class="name-letter" style="--i:6">v</span>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="nav-link active">Home</a></li>
            <li><a href="#" class="nav-link">Stats</a></li>
            <li><a href="#" class="nav-link">About</a></li>
            <li><a href="#" class="nav-link">Contact</a></li>
        </ul>
        <div class="nav-glow"></div>
    </nav>

    <div class="container">
        <h1>LeetMetric</h1>

        <div class="user-container">
            <p>Enter your LeetCode Username: </p>
            <div class="user-input-container">
                <input type="text" placeholder="e.g. neetcode" id="user-input">
                <button id="search-btn">Search</button>
            </div>
            <div id="error-msg" class="error-message"></div>
        </div>

        <div class="stats-container">
            <div class="progress">
                <div class="progress-item">
                    <div class="easy-progress circle" style="--progress-degree: 0%;">
                        <span id="easy-label">0/0</span>
                        <div class="difficulty-text">Easy</div>
                    </div>
                </div>

                <div class="progress-item">
                    <div class="medium-progress circle" style="--progress-degree: 0%;">
                        <span id="medium-label">0/0</span>
                        <div class="difficulty-text">Medium</div>
                    </div>
                </div>

                <div class="progress-item">
                    <div class="hard-progress circle" style="--progress-degree: 0%;">
                        <span id="hard-label">0/0</span>
                        <div class="difficulty-text">Hard</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const searchButton = document.getElementById("search-btn");
            const usernameInput = document.getElementById("user-input");
            const errorMsg = document.getElementById("error-msg");
            
            const easyProgressCircle = document.querySelector(".easy-progress");
            const mediumProgressCircle = document.querySelector(".medium-progress");
            const hardProgressCircle = document.querySelector(".hard-progress");
            
            const easyLabel = document.getElementById("easy-label");
            const mediumLabel = document.getElementById("medium-label");
            const hardLabel = document.getElementById("hard-label");

            function validateUsername(username) {
                if (username.trim() === "") {
                    errorMsg.textContent = "Username should not be empty.";
                    return false;
                }
                const regex = /^[a-zA-Z0-9_-]{1,30}$/;
                const isMatching = regex.test(username);
                if (!isMatching) {
                    errorMsg.textContent = "Invalid Username formatting.";
                }
                return isMatching;
            }

            async function fetchUserDetails(username) {
                try {
                    searchButton.textContent = "Searching..";
                    searchButton.disabled = true;
                    errorMsg.textContent = ""; // Clear errors

                    // Using a public proxy API that doesn't have CORS restrictions
                    const targetUrl = `https://leetcode-stats-api.herokuapp.com/${username}`;

                    const response = await fetch(targetUrl);

                    if (!response.ok) {
                        throw new Error("Unable to fetch user details");
                    }

                    const parseData = await response.json();
                    console.log("API Response:", parseData);

                    // The API returns a status message if it fails
                    if (parseData.status === "error") {
                        errorMsg.textContent = parseData.message || "User not found.";
                        return;
                    }

                    displayUserData(parseData);

                } catch (error) {
                    console.error(error);
                    errorMsg.textContent = "No data found or network error.";
                } finally {
                    searchButton.textContent = "Search";
                    searchButton.disabled = false;
                }
            }

            function displayUserData(data) {
                // Update Text Labels
                easyLabel.textContent = `${data.easySolved}/${data.totalEasy}`;
                mediumLabel.textContent = `${data.mediumSolved}/${data.totalMedium}`;
                hardLabel.textContent = `${data.hardSolved}/${data.totalHard}`;

                // Calculate Percentages
                // Added fallback to 0 in case total is somehow 0
                const easyPercent = data.totalEasy > 0 ? (data.easySolved / data.totalEasy) * 100 : 0;
                const mediumPercent = data.totalMedium > 0 ? (data.mediumSolved / data.totalMedium) * 100 : 0;
                const hardPercent = data.totalHard > 0 ? (data.hardSolved / data.totalHard) * 100 : 0;

                // Update CSS variables to animate the donut chart
                easyProgressCircle.style.setProperty("--progress-degree", `${easyPercent}%`);
                mediumProgressCircle.style.setProperty("--progress-degree", `${mediumPercent}%`);
                hardProgressCircle.style.setProperty("--progress-degree", `${hardPercent}%`);
            }

            // Listen for click on search
            searchButton.addEventListener('click', () => {
                const username = usernameInput.value;
                if (validateUsername(username)) {
                    fetchUserDetails(username);
                }
            });

            // Allow 'Enter' key to trigger search
            usernameInput.addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    searchButton.click();
                }
            });
        });
    </script>
</body>
</html>
